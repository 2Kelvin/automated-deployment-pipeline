name: Code linting and Unit tests
on: [push, pull_request]
jobs:
  check_linting:
    runs-on: ubuntu-latest
    steps:
      - name: Download repo to runner
        uses: actions/checkout@v6.0.2

      - name: Install Python 3.14.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14.3"

      - name: Check runner's Python version
        run: |
          python3 --version
          pip --version

      - name: Run ruff-action Python linter
        uses: astral-sh/ruff-action@v3.6.1

  unit_tests:
    needs: check_linting # if linting checks don't pass, dont run tests
    runs-on: ubuntu-latest
    steps:
      - name: Download repo to runner
        uses: actions/checkout@v6.0.2

      - name: Install Python 3.14.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14.3"

      - name: Install project dependencies
        run: pip install fastapi uvicorn sqlalchemy psycopg2-binary pytest httpx

      - name: Run unit tests
        run: pytest

      - name: Docker Hub login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN}}


      - name: Build Docker image # docker is already preinstalled in runner
        run: docker build -t rocketman02/python-fastapi-postgres:${{ github.sha }} .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
           | sudo sh -s -- -b /usr/local/bin v0.69.3

          trivy --version

      - name: Trivy Docker image scan
        run: trivy image rocketman02/python-fastapi-postgres:${{ github.sha }}

      - name: Push Docker image to Docker Hub
        run: docker push rocketman02/python-fastapi-postgres:${{ github.sha }}
