name: Code linting and Unit tests
on: [push, pull_request]
jobs:
  check_linting:
    runs-on: ubuntu-latest
    steps:
      - name: Download repo to runner
        uses: actions/checkout@v6.0.2

      - name: Install Python 3.14.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14.3"

      - name: Check runner's Python version
        run: |
          python3 --version
          pip --version

      - name: Run ruff-action Python linter
        uses: astral-sh/ruff-action@v3.6.1
