name: Code linting and Unit tests
on: [push, pull_request]
jobs:
  check_linting:
    runs-on: ubuntu-latest
    steps:
      - name: Download repo to runner
        uses: actions/checkout@v6.0.2

      - name: Install Python 3.14.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14.3"

      - name: Run ruff-action Python linter
        uses: astral-sh/ruff-action@v3.6.1

  unit_tests:
    needs: check_linting # if linting checks don't pass, dont run tests
    runs-on: ubuntu-latest
    steps:
      - name: Download repo to runner
        uses: actions/checkout@v6.0.2

      - name: Install Python 3.14.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14.3"

      - name: Install project dependencies
        run: pip install fastapi uvicorn sqlalchemy psycopg2-binary pytest httpx

      - name: Run unit tests
        run: pytest

      - name: Docker Hub login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN}}

      - name: Build Docker image # docker is already preinstalled in runner
        run: docker build -t rocketman02/python-fastapi-postgres:${{ github.sha }} .

      - name: Trivy docker image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'rocketman02/python-fastapi-postgres:${{ github.sha }}'
          ignore-unfixed: true
          vuln-type: 'os,library'
          format: 'table'
          output: 'trivy-scan-results'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy scan results to GitHub
        if: always() # print scan results even if trivy scan returns an error and fails
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: 'trivy-scan-results'
          path: ./trivy-scan-results

          # Todo
          # upload scan artifact: all severity
          # fail if severity: critical/high

      - name: Push Docker image to Docker Hub
        run: docker push rocketman02/python-fastapi-postgres:${{ github.sha }}

