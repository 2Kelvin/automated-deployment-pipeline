services:
  # database
  postgres:
    image: postgres:18.3-alpine
    expose:
      - 5432
    environment:
      POSTGRES_DB: my_stock
      POSTGRES_USER: kev
      POSTGRES_PASSWORD_FILE: /run/secrets/db_passwd
    healthcheck: # check if postgres is ready
      test: ["CMD-SHELL", "pg_isready -U kev -d my_stock"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - my_stock:/var/lib/postgresql
    secrets:
      - db_passwd

  # api
  python_api:
    depends_on:
      postgres:
        condition: service_healthy
    build: ./
    ports:
      - "8000:8000"
    secrets:
      - db_passwd

secrets:
  db_passwd:
    file: secrets/password.txt

volumes:
  my_stock:
